name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (api)
        run: pnpm --filter api exec prisma generate --schema=prisma/schema.prisma

      - name: Build
        run: pnpm build

      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p .release-bundle
          mkdir -p .release-artifacts
          rsync -a \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".turbo" \
            --exclude ".release-artifacts" \
            ./ .release-bundle/
          tar -czf ".release-artifacts/workspace-${TAG}.tar.gz" -C .release-bundle .

      - name: Upload release bundle
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: .release-artifacts/workspace-${{ github.ref_name }}.tar.gz
          asset_name: workspace-${{ github.ref_name }}.tar.gz
          tag: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            Implementações desta versão:

            - Versionamento no frontend com exibição da versão atual.
            - Endpoint de metadados de versão no backend (`/api/v1/meta/version`).
            - Indicador de atualização disponível com link para Releases.
            - Melhorias na exportação de relatórios (mensagem, PDF e planilha).
            - Ajustes na estrutura e visual de relatórios para foco em exportação.
            - Melhorias de performance no build web com split de chunks.
            - Padronização de feedbacks de interface usando toast.
            - Remoção da aba "Em construção" nas páginas de Relatórios e Configurações.
          draft: false
          prerelease: false
          make_latest: true
          overwrite: true
