name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.vars.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (api)
        run: pnpm --filter api exec prisma generate --schema=prisma/schema.prisma

      - name: Build
        run: pnpm build

      - name: Package artifacts
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          mkdir -p .release-artifacts
          tar -czf ".release-artifacts/workspace-api-${TAG}.tar.gz" -C apps/api dist
          tar -czf ".release-artifacts/workspace-web-${TAG}.tar.gz" -C apps/web dist

      - name: Upload API asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: .release-artifacts/workspace-api-${{ steps.vars.outputs.tag }}.tar.gz
          asset_name: workspace-api-${{ steps.vars.outputs.tag }}.tar.gz
          tag: ${{ steps.vars.outputs.tag }}
          overwrite: true

      - name: Upload Web asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: .release-artifacts/workspace-web-${{ steps.vars.outputs.tag }}.tar.gz
          asset_name: workspace-web-${{ steps.vars.outputs.tag }}.tar.gz
          tag: ${{ steps.vars.outputs.tag }}
          overwrite: true
